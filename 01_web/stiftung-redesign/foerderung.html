<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Förderung | Edmund Siemers-Stiftung</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:   #1a1a18;
      --mid:   #4a4a44;
      --light: #8a8a80;
      --rule:  #d8d4cc;
      --bg:    #faf9f6;
      --cream: #f2efe8;
      --red:   #b8003a;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--ink);
      font-size: 16px;
      line-height: 1.7;
    }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; height: 68px;
      background: rgba(250,249,246,0.97);
      border-bottom: 1px solid var(--rule);
    }
    .nav-logo { text-decoration: none; }
    .nav-logo img { height: 36px; width: auto; display: block; }
    .nav-links { display: flex; gap: 36px; list-style: none; }
    .nav-links a {
      font-size: 12px; font-weight: 500; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--mid); text-decoration: none;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--red); }

    /* HAMBURGER */
    .hamburger {
      display: none; flex-direction: column; justify-content: center;
      gap: 5px; background: none; border: none; cursor: pointer; padding: 6px;
    }
    .hamburger span {
      display: block; width: 22px; height: 1.5px; background: var(--ink);
      transition: all 0.25s; transform-origin: center;
    }
    .hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

    /* MOBILE OVERLAY */
    .mob-menu {
      display: none; position: fixed;
      top: 68px; left: 0; right: 0; bottom: 0; z-index: 999;
      background: var(--bg); padding: 24px;
      flex-direction: column;
    }
    .mob-menu.open { display: flex; }
    .mob-menu a {
      font-family: 'Playfair Display', serif;
      font-size: 26px; color: var(--ink); text-decoration: none;
      padding: 18px 0; border-bottom: 1px solid var(--rule);
    }
    .mob-menu a:hover { color: var(--red); }

    /* PAGE HERO */
    .page-hero {
      padding: 120px 40px 64px;
      max-width: 1100px; margin: 0 auto;
      border-bottom: 1px solid var(--rule);
    }
    .eyebrow {
      font-size: 11px; font-weight: 500; letter-spacing: 0.16em;
      text-transform: uppercase; color: var(--red);
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 20px;
    }
    .eyebrow::before {
      content: ''; display: block;
      width: 28px; height: 1px; background: var(--red);
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(32px, 5vw, 52px);
      font-weight: 400; line-height: 1.15;
      margin-bottom: 20px;
    }
    .lead {
      font-size: 17px; color: var(--mid);
      line-height: 1.8; max-width: 600px;
    }

    /* CONTENT */
    .content {
      max-width: 1100px; margin: 0 auto;
      padding: 64px 40px;
    }

    .section-label {
      display: block;
      font-size: 11px; font-weight: 500; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--red); margin-bottom: 10px;
    }
    h2 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(22px, 3vw, 34px);
      font-weight: 400; line-height: 1.25; margin-bottom: 20px;
    }
    h3 {
      font-family: 'Playfair Display', serif;
      font-size: 19px; font-weight: 500;
      line-height: 1.3; margin-bottom: 12px;
    }
    p {
      font-size: 15px; color: var(--mid);
      line-height: 1.85; margin-bottom: 18px;
      max-width: 680px;
    }
    hr { border: none; border-top: 1px solid var(--rule); margin: 56px 0; }

    /* GRID */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 64px; align-items: start;
    }
    .three-col {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
    }

    /* CARD */
    .card {
      background: var(--cream); padding: 36px;
      transition: background 0.2s;
    }
    .card:hover { background: white; }
    .card-num {
      font-family: 'Playfair Display', serif;
      font-size: 56px; color: #e0dbd2;
      line-height: 1; margin-bottom: 20px;
    }
    .card p { max-width: none; margin-bottom: 0; }

    /* BLOG LIST */
    .blog-list { display: flex; flex-direction: column; gap: 2px; }
    .blog-item {
      display: grid; grid-template-columns: 140px 1fr;
      background: var(--cream); transition: background 0.2s;
    }
    .blog-item:hover { background: white; }
    .blog-meta {
      padding: 32px 24px;
      border-right: 1px solid var(--rule);
    }
    .blog-date {
      font-size: 11px; font-weight: 500;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--red);
    }
    .blog-cat {
      font-size: 11px; color: var(--light);
      margin-top: 6px; line-height: 1.4;
    }
    .blog-body { padding: 32px 36px; }
    .blog-body h3 { margin-bottom: 8px; }
    .blog-body p { margin-bottom: 0; font-size: 14px; }

    /* CONTACT */
    .contact-label {
      font-size: 11px; font-weight: 500;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--light); margin-bottom: 6px;
    }
    .contact-value {
      font-size: 16px; color: var(--ink);
      text-decoration: none; display: block;
    }
    a.contact-value:hover { color: var(--red); }

    .btn-red {
      display: inline-flex; align-items: center; gap: 10px;
      background: var(--red); color: white;
      padding: 14px 24px; text-decoration: none;
      font-size: 12px; font-weight: 500;
      letter-spacing: 0.08em; text-transform: uppercase;
      border: none; cursor: pointer; width: 100%;
      justify-content: center;
    }
